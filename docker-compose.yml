services:
  db:
    image: pgvector/pgvector:pg16
    container_name: grabpic_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: grabpic
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d grabpic"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: grabpic_api
    volumes:
      - .:/app
      - ./storage:/app/storage
      - deepface_weights:/root/.deepface/weights
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/grabpic
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  deepface_weights: